# Project Spine configuration
autonomy: med  # low | med | high

# Model preferences (override defaults in .codex/agents/*.toml)
models:
  planning: { model: gpt-5.4, effort: high }
  exploration: { model: gpt-5.4-mini, effort: medium }
  implementation: { model: gpt-5.3-codex, effort: high }
  review: { model: gpt-5.4, effort: high }
  quick_edit: { model: gpt-5.3-codex-spark, effort: medium }
  deep_decision: { model: gpt-5.4, effort: xhigh }

agents:
  max_threads: 4
  max_depth: 1
